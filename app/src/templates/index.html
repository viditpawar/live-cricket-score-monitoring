<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricPulse Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f8fc;
            --bg-accent: #e8eff7;
            --panel: #ffffff;
            --panel-strong: #0f223a;
            --text: #13263f;
            --text-soft: #51657f;
            --line: #d6e1ee;
            --brand: #0f6edb;
            --brand-deep: #0a4ea3;
            --brand-soft: #dbeafc;
            --live: #d64141;
            --recent: #0d8f6d;
            --upcoming: #f0982f;
            --shadow: 0 20px 45px rgba(12, 39, 71, 0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: "Manrope", "Segoe UI", "Trebuchet MS", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 800px at -10% -20%, #d5e7ff 0%, transparent 60%),
                radial-gradient(900px 700px at 110% 10%, #d6f3f0 0%, transparent 55%),
                linear-gradient(180deg, var(--bg) 0%, #eef4fa 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(to right, rgba(15, 34, 58, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 34, 58, 0.03) 1px, transparent 1px);
            background-size: 44px 44px;
            z-index: 0;
        }

        .app-shell {
            position: relative;
            z-index: 1;
            max-width: 1240px;
            margin: 0 auto;
            padding: 26px 22px 34px;
        }

        .hero {
            background: linear-gradient(135deg, #0f223a 0%, #163558 60%, #1b3f68 100%);
            border-radius: var(--radius-lg);
            color: #f5fbff;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            overflow: hidden;
            position: relative;
            animation: reveal 650ms ease-out both;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            right: -40px;
            top: -70px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(90, 180, 255, 0.3) 0%, rgba(90, 180, 255, 0.04) 60%, transparent 100%);
        }

        .hero-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }

        .brand-wrap {
            max-width: 720px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-mark .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6ef38d;
            box-shadow: 0 0 0 0 rgba(110, 243, 141, 0.75);
            animation: pulse 1.8s infinite;
        }

        h1 {
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            font-size: clamp(1.7rem, 2.6vw, 2.5rem);
            margin: 14px 0 6px;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            margin: 0;
            color: #cbe0f7;
            font-size: 0.96rem;
            max-width: 760px;
            line-height: 1.5;
        }

        .hero-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
            min-width: 240px;
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .theme-switch {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            padding: 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.24);
        }

        .theme-btn {
            border: 1px solid transparent;
            background: transparent;
            color: #f8fbff;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
        }

        .theme-btn:hover {
            transform: translateY(-1px);
        }

        .theme-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.65);
        }

        .btn {
            border: 0;
            border-radius: 999px;
            padding: 11px 16px;
            font-weight: 700;
            font-size: 0.86rem;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4da4ff 0%, #2a82df 100%);
            color: #f7fbff;
            box-shadow: 0 10px 20px rgba(34, 119, 210, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(34, 119, 210, 0.45);
        }

        .btn-muted {
            background: rgba(255, 255, 255, 0.14);
            color: #f5fbff;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .btn-muted:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .status-strip {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .stat-chip {
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 14px;
            padding: 12px;
            min-height: 80px;
        }

        .stat-label {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #b7cbe2;
            margin-bottom: 8px;
        }

        .stat-value {
            display: block;
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
        }

        .board {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(190, 210, 230, 0.7);
            border-radius: var(--radius-lg);
            padding: 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 14px 30px rgba(16, 45, 77, 0.1);
            animation: reveal 760ms ease-out both;
            animation-delay: 90ms;
        }

        .board-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0 12px;
            min-height: 48px;
        }

        .search-wrap svg {
            flex: 0 0 auto;
            color: #6e8098;
        }

        .search-wrap input {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            font-size: 0.95rem;
            color: var(--text);
            padding: 12px 10px;
            font-family: inherit;
        }

        .search-wrap input::placeholder {
            color: #8ea0b8;
        }

        .meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            color: var(--text-soft);
            font-size: 0.84rem;
        }

        .meta .pill {
            background: #edf3fa;
            border: 1px solid #d5e1ef;
            border-radius: 999px;
            padding: 7px 10px;
            white-space: nowrap;
        }

        .warning {
            display: none;
            margin: 0 0 12px;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.9rem;
            border: 1px solid #ffd49f;
            color: #8a4c04;
            background: #fff5e8;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tab-btn {
            border: 1px solid #d2dfef;
            background: #f4f8fd;
            color: #44607f;
            border-radius: 999px;
            padding: 8px 13px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 160ms ease;
        }

        .tab-btn:hover {
            border-color: #b8cde7;
            background: #eef4fc;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #1d7de3 0%, #115fb9 100%);
            color: #f8fbff;
            border-color: transparent;
            box-shadow: 0 10px 18px rgba(16, 95, 185, 0.25);
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
            min-height: 220px;
        }

        .match-card {
            background: var(--panel);
            border: 1px solid #d7e3f0;
            border-radius: var(--radius-md);
            padding: 14px;
            box-shadow: 0 8px 18px rgba(20, 50, 82, 0.07);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            animation: cardIn 520ms cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
            animation-delay: var(--delay, 0ms);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .match-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(20, 50, 82, 0.1);
        }

        .match-card:focus-visible {
            outline: 3px solid #6aaeff;
            outline-offset: 2px;
        }

        .match-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: #b3c7df;
        }

        .match-card.live::before {
            background: linear-gradient(180deg, #fb5f5f 0%, #d64141 100%);
        }

        .match-card.recent::before {
            background: linear-gradient(180deg, #28b889 0%, #0d8f6d 100%);
        }

        .match-card.upcoming::before {
            background: linear-gradient(180deg, #f5bb5a 0%, #f0982f 100%);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .teams {
            margin: 0;
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            font-size: 1.05rem;
            line-height: 1.35;
            letter-spacing: -0.01em;
        }

        .badge {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 6px 9px;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .badge.live {
            color: #7f1212;
            background: #ffe3e3;
            border: 1px solid #ffc5c5;
        }

        .badge.recent {
            color: #07543f;
            background: #daf7ee;
            border: 1px solid #bae8d9;
        }

        .badge.upcoming {
            color: #7b4d11;
            background: #fff0da;
            border: 1px solid #ffd9a9;
        }

        .team-strip {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .team-pill {
            background: #edf3fb;
            border: 1px solid #d4e1f2;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 58px;
        }

        .team-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: #ffffff;
            flex: 0 0 auto;
        }

        .team-logo-fallback {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            background: #dce9f8;
            color: #1d4d83;
            border: 1px solid rgba(0, 0, 0, 0.08);
            flex: 0 0 auto;
        }

        .team-text {
            min-width: 0;
        }

        .team-name {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            word-break: break-word;
        }

        .team-flag {
            display: block;
            font-size: 12px;
            color: var(--text-soft);
            margin-top: 2px;
            letter-spacing: 0.03em;
        }

        .status {
            margin: 10px 0 8px;
            font-size: 0.88rem;
            color: var(--text-soft);
            font-weight: 600;
            line-height: 1.45;
        }

        .score {
            margin: 0 0 10px;
            background: #edf3fb;
            border: 1px solid #d4e1f2;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 0.88rem;
            color: #1b3a5f;
            font-weight: 700;
            line-height: 1.5;
        }

        .score.empty {
            color: #70839b;
            font-weight: 600;
            font-style: italic;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 7px;
        }

        .meta-line {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.82rem;
            color: #60758f;
            border-top: 1px dashed #dce7f4;
            padding-top: 8px;
        }

        .meta-line strong {
            color: #223d5b;
            font-weight: 700;
            text-align: right;
            max-width: 65%;
        }

        .empty-state {
            display: grid;
            place-items: center;
            text-align: center;
            padding: 30px 20px;
            border: 1px dashed #c6d5e7;
            background: #f7fbff;
            color: #5a6f89;
            border-radius: var(--radius-md);
        }

        .empty-state h3 {
            margin: 0 0 8px;
            font-size: 1.05rem;
            color: #294466;
        }

        .fatal-error {
            display: none;
            margin-top: 12px;
            border: 1px solid #f6b3b3;
            background: #ffe8e8;
            color: #8d1f1f;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.92rem;
        }

        .fatal-error.show {
            display: block;
        }

        .match-modal {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 220ms ease;
        }

        .match-modal.open {
            pointer-events: auto;
            opacity: 1;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            border: 0;
            background: rgba(7, 22, 39, 0.56);
            padding: 0;
            cursor: pointer;
        }

        .match-drawer {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: min(540px, 96vw);
            background: var(--panel);
            border-left: 1px solid #d5e2f1;
            box-shadow: -12px 0 28px rgba(9, 28, 50, 0.35);
            transform: translateX(100%);
            transition: transform 240ms ease;
            display: flex;
            flex-direction: column;
        }

        .match-modal.open .match-drawer {
            transform: translateX(0);
        }

        .drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid #d6e1ee;
        }

        .drawer-title {
            margin: 0;
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            color: var(--text);
            font-size: 1.15rem;
            line-height: 1.25;
        }

        .drawer-close {
            border: 1px solid #d6e1ee;
            background: transparent;
            color: var(--text-soft);
            border-radius: 10px;
            width: 34px;
            height: 34px;
            font-size: 17px;
            cursor: pointer;
            line-height: 1;
        }

        .drawer-close:hover {
            transform: translateY(-1px);
        }

        .drawer-body {
            padding: 14px 16px 24px;
            overflow: auto;
            color: var(--text-soft);
        }

        .drawer-pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .drawer-pill {
            border: 1px solid #d5e1ef;
            background: #edf3fa;
            color: #415b7a;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .drawer-score {
            background: #edf3fb;
            border: 1px solid #d4e1f2;
            color: #1b3a5f;
            border-radius: 12px;
            padding: 10px 12px;
            margin: 0 0 12px;
            font-weight: 700;
            line-height: 1.45;
        }

        .drawer-score ul {
            margin: 0;
            padding-left: 18px;
        }

        .drawer-score li {
            margin: 4px 0;
        }

        .drawer-team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .drawer-team-card {
            background: var(--panel);
            border: 1px solid #d6e1ee;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .drawer-team-logo,
        .drawer-team-logo-fallback {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .drawer-team-logo {
            object-fit: cover;
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: #ffffff;
        }

        .drawer-team-logo-fallback {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            background: #dce9f8;
            color: #1d4d83;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .drawer-team-name {
            display: block;
            color: var(--text);
            font-weight: 800;
            line-height: 1.2;
        }

        .drawer-team-flag {
            display: block;
            font-size: 12px;
            color: var(--text-soft);
            margin-top: 2px;
        }

        .drawer-details {
            display: grid;
            gap: 8px;
        }

        .drawer-detail-line {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            border-top: 1px dashed #dce7f4;
            padding-top: 8px;
            font-size: 14px;
        }

        .drawer-detail-line strong {
            color: var(--text);
            text-align: right;
            max-width: 65%;
        }

        body[data-theme="minimal"] .hero {
            background: #ffffff;
            border-color: #d7dde3;
            color: #1f2b39;
            box-shadow: 0 8px 24px rgba(33, 47, 63, 0.08);
        }

        body[data-theme="minimal"] .hero-subtitle {
            color: #61707f;
        }

        body[data-theme="minimal"] .brand-mark {
            background: rgba(31, 43, 57, 0.06);
            border-color: rgba(31, 43, 57, 0.14);
            color: #1f2b39;
        }

        body[data-theme="minimal"] .theme-switch {
            background: rgba(31, 43, 57, 0.06);
            border-color: rgba(31, 43, 57, 0.14);
        }

        body[data-theme="minimal"] .theme-btn {
            color: #1f2b39;
        }

        body[data-theme="minimal"] .theme-btn.active {
            background: rgba(31, 43, 57, 0.08);
            border-color: rgba(31, 43, 57, 0.35);
        }

        body[data-theme="minimal"] .btn-muted {
            background: rgba(31, 43, 57, 0.08);
            border-color: rgba(31, 43, 57, 0.2);
            color: #223245;
        }

        body[data-theme="minimal"] .stat-chip {
            background: #f8fafc;
            border-color: #d7dde3;
        }

        body[data-theme="minimal"] .stat-label {
            color: #6f7f90;
        }

        body[data-theme="minimal"] .stat-value {
            color: #1f2b39;
        }

        body[data-theme="minimal"]::before {
            display: none;
        }

        body[data-theme="dark-stadium"] {
            color: #d8e6f5;
        }

        body[data-theme="dark-stadium"] .hero {
            background: linear-gradient(135deg, #081726 0%, #0e2841 55%, #133656 100%);
            border-color: #2a4764;
            color: #eaf4ff;
            box-shadow: 0 22px 48px rgba(1, 9, 18, 0.56);
        }

        body[data-theme="dark-stadium"] .hero-subtitle {
            color: #b7d0ea;
        }

        body[data-theme="dark-stadium"] .stat-chip {
            background: rgba(7, 28, 48, 0.55);
            border-color: rgba(80, 125, 167, 0.35);
        }

        body[data-theme="dark-stadium"] .stat-label {
            color: #95b1cb;
        }

        body[data-theme="dark-stadium"] .stat-value {
            color: #ecf6ff;
        }

        body[data-theme="dark-stadium"] .board {
            background: rgba(8, 24, 40, 0.82);
            border-color: rgba(65, 109, 146, 0.45);
            box-shadow: 0 18px 34px rgba(1, 11, 20, 0.52);
        }

        body[data-theme="dark-stadium"] .search-wrap {
            background: #0c2237;
            border-color: #355a7c;
        }

        body[data-theme="dark-stadium"] .search-wrap svg {
            color: #8fb0ce;
        }

        body[data-theme="dark-stadium"] .search-wrap input {
            color: #d8e6f5;
        }

        body[data-theme="dark-stadium"] .meta .pill,
        body[data-theme="dark-stadium"] .drawer-pill {
            background: #0e2a45;
            border-color: #35597a;
            color: #b0c8df;
        }

        body[data-theme="dark-stadium"] .tab-btn {
            background: #0e2b47;

        @media (max-width: 980px) {

        @media (max-width: 640px) {
            .app-shell {
                padding: 16px 12px 26px;

            .hero,

                border-radius: 18px;

    </style>
</head>
<body data-theme="broadcast">
    <main class="app-shell">
        <section class="hero">
            <div class="hero-top">
                <div class="brand-wrap">
                    <div class="brand-mark">
                        <span class="dot"></span>

                        <button id="refresh-btn" class="btn btn-primary" type="button">Refresh Now</button>

            <div class="status-strip">

                <div class="stat-chip">

                <div class="stat-chip">

                <div class="stat-chip">
                    <span class="stat-label">Total Matches</span>

        </section>

        <section class="board">
            <div class="board-top">
                <label class="search-wrap" for="search-input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm10 2-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <input id="search-input" type="text" placeholder="Search team, match name, venue, or status">

            <div class="tabs" role="tablist" aria-label="Match categories">

                <button class="tab-btn" data-tab="live" type="button">Live</button>

    </main>

    <div id="match-modal" class="match-modal" aria-hidden="true">
        <button class="modal-backdrop" type="button" data-close-modal aria-label="Close match details"></button>
        <aside class="match-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">

                <h2 class="drawer-title" id="drawer-title">Match Details</h2>

            </div>
            <div id="drawer-body" class="drawer-body"></div>
        </aside>
    </div>

    <script>
        const TEAM_COUNTRY_HINTS = {
            "india": "IN",
            "australia": "AU",
            "england": "GB",
            "pakistan": "PK",
            "new zealand": "NZ",
            "south africa": "ZA",
            "sri lanka": "LK",
            "bangladesh": "BD",
            "afghanistan": "AF",
            "ireland": "IE",
            "zimbabwe": "ZW",
            "netherlands": "NL",
            "scotland": "GB",
            "uae": "AE",
            "nepal": "NP",
            "namibia": "NA",
            "usa": "US",
            "canada": "CA",
            "west indies": "JM",
            "mumbai": "IN",
            "chennai": "IN",
            "kolkata": "IN",
            "delhi": "IN",
            "punjab": "IN",
            "rajasthan": "IN",
            "hyderabad": "IN",
            "gujarat": "IN",
            "lucknow": "IN",
            "bangalore": "IN",
            "brisbane": "AU",
            "sydney": "AU",
            "melbourne": "AU",
            "adelaide": "AU",
            "hobart": "AU",
            "perth": "AU",
            "karachi": "PK",
            "lahore": "PK",
            "islamabad": "PK",
            "peshawar": "PK",
            "quetta": "PK",
            "multan": "PK",
            "county": "GB"
        };

        const THEME_STORAGE_KEY = "cricpulse_theme";
        const AVAILABLE_THEMES = ["broadcast", "minimal", "dark-stadium"];

        const state = {
            allMatches: [],
            live: [],
            recent: [],
            upcoming: [],
            activeTab: "all",
            search: "",
            lastUpdated: null,
            matchLookup: {},
            activeMatchKey: null,
            theme: "broadcast"
        };

        const tabs = Array.from(document.querySelectorAll(".tab-btn"));
        const themeButtons = Array.from(document.querySelectorAll(".theme-btn"));
        const searchInput = document.getElementById("search-input");
        const refreshButton = document.getElementById("refresh-btn");
        const clearFilterButton = document.getElementById("clear-filter-btn");
        const modal = document.getElementById("match-modal");
        const drawerBody = document.getElementById("drawer-body");
        const drawerClose = document.getElementById("drawer-close");
        const matchesGrid = document.getElementById("matches-grid");

        function toSafeText(value, fallback = "N/A") {
            if (value === null || value === undefined || value === "") {
                return fallback;
            }

            return String(value);
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function safeImageUrl(url) {
            if (!url || typeof url !== "string") {
                return "";
            }

            const trimmed = url.trim();
            if (/^https?:\/\//i.test(trimmed)) {
                return trimmed;
            }

            return "";
        }

        function buildInitials(name) {
            const raw = toSafeText(name, "").trim();
            if (!raw) {
                return "TM";
            }

            const words = raw.split(/\s+/).filter(Boolean);
            if (words.length === 1) {
                return words[0].slice(0, 2).toUpperCase();
            }

            return (words[0][0] + words[1][0]).toUpperCase();
        }

        function inferCountryCode(teamName) {
            const normalized = toSafeText(teamName, "").toLowerCase();
            for (const hint of Object.keys(TEAM_COUNTRY_HINTS)) {
                if (normalized.includes(hint)) {
                    return TEAM_COUNTRY_HINTS[hint];
                }
            }

            return "";
        }

        function flagFromCountryCode(code) {
            const upper = toSafeText(code, "").toUpperCase();
            if (!/^[A-Z]{2}$/.test(upper)) {
                return "N/A";
            }

            const first = 127397 + upper.charCodeAt(0);
            const second = 127397 + upper.charCodeAt(1);
            return String.fromCodePoint(first, second);
        }

        function getFlagForTeam(teamName) {
            return flagFromCountryCode(inferCountryCode(teamName));
        }

        function normalizeDate(value) {
            if (!value) {
                return "N/A";
            }

            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) {
                return String(value);
            }

            return parsed.toLocaleString(undefined, {
                weekday: "short",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit"
            });
        }

        function matchTypeTag(match) {
            const stateValue = toSafeText(match.state, "").toLowerCase();
            const status = toSafeText(match.status, "").toLowerCase();

            if (stateValue === "live" || stateValue === "inprogress" || status.includes("live")) {
                return "live";
            }

            if (
                stateValue === "result" ||
                stateValue === "completed" ||
                status.includes("won") ||
                status.includes("match ended") ||
                status.includes("draw") ||
                status.includes("abandoned") ||
                status.includes("no result")
            ) {
                return "recent";
            }

            return "upcoming";
        }

        function buildMatchKey(match, sourceName, index) {
            const id = toSafeText(match.id, "").trim();
            if (id) {
                return "id:" + id;
            }

            return [
                sourceName,
                toSafeText(match.name, "match"),
                toSafeText(match.date, ""),
                index
            ].join("|");
        }

        function normalizeTeamDetails(match) {
            const details = Array.isArray(match.team_details) ? match.team_details : [];
            const normalized = details
                .filter((team) => team && (team.name || team.short_name || team.logo))
                .map((team) => ({
                    name: toSafeText(team.name, "Team"),
                    shortName: toSafeText(team.short_name, ""),
                    logo: safeImageUrl(team.logo)
                }));

            if (normalized.length > 0) {
                return normalized.slice(0, 2);
            }

            if (Array.isArray(match.teams) && match.teams.length > 0) {
                return match.teams.slice(0, 2).map((teamName) => ({
                    name: toSafeText(teamName, "Team"),
                    shortName: "",
                    logo: ""
                }));
            }

            return [
                { name: "Team A", shortName: "", logo: "" },
                { name: "Team B", shortName: "", logo: "" }
            ];
        }

        function prepareMatches(collection, sourceName) {
            if (!Array.isArray(collection)) {
                return [];
            }

            return collection.map((item, index) => {
                const match = item || {};
                return {
                    ...match,
                    __key: buildMatchKey(match, sourceName, index),
                    __tag: matchTypeTag(match),
                    team_details: normalizeTeamDetails(match)
                };
            });
        }

        function normalizePayload(data) {
            const sourceMatches = Array.isArray(data.matches) ? data.matches : [];
            let live = Array.isArray(data.live_matches) ? data.live_matches : [];
            let recent = Array.isArray(data.recent_matches) ? data.recent_matches : [];
            let upcoming = Array.isArray(data.upcoming_matches) ? data.upcoming_matches : [];

            if (live.length === 0 && recent.length === 0 && upcoming.length === 0 && sourceMatches.length > 0) {
                sourceMatches.forEach((match) => {
                    const tag = matchTypeTag(match);
                    if (tag === "live") {
                        live.push(match);
                    } else if (tag === "recent") {
                        recent.push(match);
                    } else {
                        upcoming.push(match);
                    }
                });
            }

            const preparedLive = prepareMatches(live, "live");
            const preparedRecent = prepareMatches(recent, "recent");
            const preparedUpcoming = prepareMatches(upcoming, "upcoming");
            const allMatches = [...preparedLive, ...preparedRecent, ...preparedUpcoming];

            return {
                allMatches,
                live: preparedLive,
                recent: preparedRecent,
                upcoming: preparedUpcoming,
                servedFromCache: Boolean(data.served_from_cache),
                warning: data.warning || "",
                cacheAge: data.cache_age_seconds,
                counts: {
                    live: data.live_count ?? preparedLive.length,
                    recent: data.recent_count ?? preparedRecent.length,
                    upcoming: data.upcoming_count ?? preparedUpcoming.length,
                    total: data.total_matches ?? allMatches.length
                }
            };
        }

        function updateTopCounts(counts) {
            document.getElementById("live-count").textContent = counts.live;
            document.getElementById("recent-count").textContent = counts.recent;
            document.getElementById("upcoming-count").textContent = counts.upcoming;
            document.getElementById("total-count").textContent = counts.total;
        }

        function updateMeta(servedFromCache, cacheAge) {
            const sourceText = servedFromCache ? "Source: cached feed" : "Source: live feed";
            document.getElementById("source-pill").textContent = sourceText;

            const now = new Date();
            state.lastUpdated = now;
            let updatedText = "Updated: " + now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" });

            if (servedFromCache && cacheAge !== undefined) {
                updatedText += " | cache age " + cacheAge + "s";
            }

            document.getElementById("updated-pill").textContent = updatedText;
        }

        function updateWarning(message) {
            const warningEl = document.getElementById("warning");
            if (!message) {
                warningEl.style.display = "none";
                warningEl.textContent = "";
                return;
            }

            warningEl.style.display = "block";
            warningEl.textContent = message;
        }

        function setFatalError(message) {
            const el = document.getElementById("fatal-error");
            if (!message) {
                el.classList.remove("show");
                el.textContent = "";
                return;
            }

            el.classList.add("show");
            el.textContent = message;
        }

        function getActiveCollection() {
            if (state.activeTab === "live") {
                return state.live;
            }
            if (state.activeTab === "recent") {
                return state.recent;
            }
            if (state.activeTab === "upcoming") {
                return state.upcoming;
            }
            return state.allMatches;
        }

        function applySearch(collection) {
            const query = state.search.trim().toLowerCase();
            if (!query) {
                return collection;
            }

            return collection.filter((match) => {
                const teamText = Array.isArray(match.team_details)
                    ? match.team_details.map((team) => [team.name, team.shortName].join(" ")).join(" ")
                    : "";

                const haystack = [
                    toSafeText(match.name, ""),
                    toSafeText(match.status, ""),
                    toSafeText(match.venue, ""),
                    toSafeText(match.series, ""),
                    Array.isArray(match.teams) ? match.teams.join(" ") : "",
                    teamText,
                    toSafeText(match.match_type, "")
                ].join(" ").toLowerCase();

                return haystack.includes(query);
            });
        }

        function emptyTitleForTab() {
            if (state.activeTab === "live") {
                return "No live matches right now";
            }
            if (state.activeTab === "recent") {
                return "No recent results to show";
            }
            if (state.activeTab === "upcoming") {
                return "No upcoming fixtures available";
            }
            return "No matches available";
        }

        function emptyMessageForContext() {
            if (state.search.trim()) {
                return "Try a different team name, venue, or clear the search filter.";
            }
            return "Pull latest data using Refresh Now, or wait for the next automatic sync.";
        }

        function renderEmptyState() {
            matchesGrid.innerHTML = `
                <div class="empty-state">
                    <div>
                        <h3>${emptyTitleForTab()}</h3>
                        <p>${emptyMessageForContext()}</p>
                    </div>
                </div>
            `;
        }

        function renderTeamAvatar(team, mode) {
            const logoUrl = safeImageUrl(team.logo);
            const initials = escapeHtml(buildInitials(team.shortName || team.name));

            if (logoUrl) {
                const cls = mode === "drawer" ? "drawer-team-logo" : "team-logo";
                return `<img class="${cls}" src="${escapeHtml(logoUrl)}" alt="${escapeHtml(toSafeText(team.name, "Team"))} logo" loading="lazy">`;
            }

            const cls = mode === "drawer" ? "drawer-team-logo-fallback" : "team-logo-fallback";
            return `<span class="${cls}">${initials}</span>`;
        }

        function renderTeamPill(team) {
            const flag = escapeHtml(getFlagForTeam(team.name));
            return `
                <div class="team-pill">
                    ${renderTeamAvatar(team, "card")}
                    <div class="team-text">
                        <span class="team-name">${escapeHtml(toSafeText(team.name, "Team"))}</span>
                        <span class="team-flag">${flag}</span>
                    </div>
                </div>
            `;
        }

        function createCard(match, index) {
            const tag = match.__tag || matchTypeTag(match);
            const badgeText = tag === "live" ? "Live" : tag === "recent" ? "Result" : "Upcoming";
            const scoreText = toSafeText(match.score, "Score will appear when available");
            const scoreClass = match.score ? "score" : "score empty";
            const teamsMarkup = (match.team_details || []).map(renderTeamPill).join("");

            return `
                <article class="match-card ${tag}" style="--delay:${index * 55}ms" tabindex="0" role="button" data-match-key="${escapeHtml(match.__key)}" aria-label="Open details for ${escapeHtml(toSafeText(match.name, "match"))}">
                    <div class="card-top">
                        <h3 class="match-title">${escapeHtml(toSafeText(match.name, "Match details pending"))}</h3>
                        <span class="badge ${tag}">${escapeHtml(badgeText)}</span>
                    </div>
                    <div class="team-strip">${teamsMarkup}</div>
                    <p class="status">${escapeHtml(toSafeText(match.status, "Status unavailable"))}</p>
                    <p class="${scoreClass}">${escapeHtml(scoreText)}</p>
                    <div class="meta-grid">
                        <div class="meta-line"><span>Format</span><strong>${escapeHtml(toSafeText(match.match_type))}</strong></div>
                        <div class="meta-line"><span>Venue</span><strong>${escapeHtml(toSafeText(match.venue))}</strong></div>
                        <div class="meta-line"><span>Date</span><strong>${escapeHtml(normalizeDate(match.date))}</strong></div>
                    </div>
                </article>
            `;
        }

        function indexMatches(matches) {
            state.matchLookup = {};
            matches.forEach((match) => {
                state.matchLookup[match.__key] = match;
            });
        }

        function renderMatches() {
            const collection = getActiveCollection();
            const filtered = applySearch(collection);

            if (!filtered.length) {
                renderEmptyState();
                return;
            }

            matchesGrid.innerHTML = filtered.map((match, index) => createCard(match, index)).join("");
        }

        function setActiveTab(tabName) {
            state.activeTab = tabName;
            tabs.forEach((tab) => {
                tab.classList.toggle("active", tab.dataset.tab === tabName);
            });
            renderMatches();
        }

        function modalScoreMarkup(scoreText) {
            if (!scoreText || scoreText === "N/A") {
                return `<div class="drawer-score">Score details are not available for this match yet.</div>`;
            }

            const pieces = scoreText.split("|").map((item) => item.trim()).filter(Boolean);
            if (pieces.length <= 1) {
                return `<div class="drawer-score">${escapeHtml(scoreText)}</div>`;
            }

            const rows = pieces.map((piece) => `<li>${escapeHtml(piece)}</li>`).join("");
            return `<div class="drawer-score"><ul>${rows}</ul></div>`;
        }

        function drawerTeamCard(team) {
            const flag = escapeHtml(getFlagForTeam(team.name));
            return `
                <div class="drawer-team-card">
                    ${renderTeamAvatar(team, "drawer")}
                    <div>
                        <span class="drawer-team-name">${escapeHtml(toSafeText(team.name, "Team"))}</span>
                        <span class="drawer-team-flag">${flag}</span>
                    </div>
                </div>
            `;
        }

        function openModal(matchKey) {
            const match = state.matchLookup[matchKey];
            if (!match) {
                return;
            }

            state.activeMatchKey = matchKey;
            const tag = match.__tag || matchTypeTag(match);
            const badgeText = tag === "live" ? "Live" : tag === "recent" ? "Result" : "Upcoming";
            const scoreText = toSafeText(match.score, "N/A");
            const teamMarkup = (match.team_details || []).map(drawerTeamCard).join("");

            drawerBody.innerHTML = `
                <div class="drawer-pill-row">
                    <span class="drawer-pill">${escapeHtml(badgeText)}</span>
                    <span class="drawer-pill">${escapeHtml(toSafeText(match.match_type))}</span>
                    <span class="drawer-pill">${escapeHtml(normalizeDate(match.date))}</span>
                </div>
                <p class="status">${escapeHtml(toSafeText(match.status, "Status unavailable"))}</p>
                ${modalScoreMarkup(scoreText)}
                <div class="drawer-team-grid">${teamMarkup}</div>
                <div class="drawer-details">
                    <div class="drawer-detail-line"><span>Match</span><strong>${escapeHtml(toSafeText(match.name))}</strong></div>
                    <div class="drawer-detail-line"><span>Series</span><strong>${escapeHtml(toSafeText(match.series, "N/A"))}</strong></div>
                    <div class="drawer-detail-line"><span>Venue</span><strong>${escapeHtml(toSafeText(match.venue))}</strong></div>
                    <div class="drawer-detail-line"><span>Date</span><strong>${escapeHtml(normalizeDate(match.date))}</strong></div>
                </div>
            `;

            modal.classList.add("open");
            modal.setAttribute("aria-hidden", "false");
            document.body.classList.add("modal-open");
            drawerClose.focus();
        }

        function closeModal() {
            modal.classList.remove("open");
            modal.setAttribute("aria-hidden", "true");
            document.body.classList.remove("modal-open");
            state.activeMatchKey = null;
        }

        function applyTheme(themeName) {
            const theme = AVAILABLE_THEMES.includes(themeName) ? themeName : "broadcast";
            state.theme = theme;
            document.body.setAttribute("data-theme", theme);

            themeButtons.forEach((button) => {
                button.classList.toggle("active", button.dataset.theme === theme);
            });

            try {
                localStorage.setItem(THEME_STORAGE_KEY, theme);
            } catch (error) {
                // Ignore storage issues.
            }
        }

        function initializeTheme() {
            let saved = "broadcast";
            try {
                const stored = localStorage.getItem(THEME_STORAGE_KEY);
                if (stored) {
                    saved = stored;
                }
            } catch (error) {
                saved = "broadcast";
            }

            applyTheme(saved);
        }

        async function loadMatches(forceRefresh = false) {
            setFatalError("");

            try {
                const endpoint = forceRefresh ? "/matches?refresh=1" : "/matches";
                const response = await fetch(endpoint);
                const data = await response.json();

                if (!response.ok || data.error) {
                    const detail = data.details ? " - " + data.details : "";
                    throw new Error((data.error || "Failed to fetch match feed") + detail);
                }

                const payload = normalizePayload(data);
                state.allMatches = payload.allMatches;
                state.live = payload.live;
                state.recent = payload.recent;
                state.upcoming = payload.upcoming;
                indexMatches(payload.allMatches);

                updateTopCounts(payload.counts);
                updateMeta(payload.servedFromCache, payload.cacheAge);
                updateWarning(payload.warning);
                renderMatches();
            } catch (error) {
                updateWarning("");
                setFatalError(error.message || "Could not load matches.");
                state.allMatches = [];
                state.live = [];
                state.recent = [];
                state.upcoming = [];
                state.matchLookup = {};
                updateTopCounts({ live: 0, recent: 0, upcoming: 0, total: 0 });
                renderMatches();
            }
        }

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => setActiveTab(tab.dataset.tab));
        });

        themeButtons.forEach((button) => {
            button.addEventListener("click", () => applyTheme(button.dataset.theme));
        });

        searchInput.addEventListener("input", (event) => {
            state.search = event.target.value;
            renderMatches();
        });

        refreshButton.addEventListener("click", () => loadMatches(true));

        clearFilterButton.addEventListener("click", () => {
            state.search = "";
            searchInput.value = "";
            renderMatches();
        });

        matchesGrid.addEventListener("click", (event) => {
            const card = event.target.closest(".match-card[data-match-key]");
            if (!card) {
                return;
            }

            openModal(card.dataset.matchKey);
        });

        matchesGrid.addEventListener("keydown", (event) => {
            const card = event.target.closest(".match-card[data-match-key]");
            if (!card) {
                return;
            }

            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                openModal(card.dataset.matchKey);
            }
        });

        modal.addEventListener("click", (event) => {
            if (event.target.matches("[data-close-modal]")) {
                closeModal();
            }
        });

        drawerClose.addEventListener("click", closeModal);

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && modal.classList.contains("open")) {
                closeModal();
            }
        });

        initializeTheme();
        loadMatches();
        setInterval(() => loadMatches(false), 60000);
    </script>
</body>
</html>

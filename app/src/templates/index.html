<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricPulse Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f8fc;
            --bg-accent: #e8eff7;
            --panel: #ffffff;
            --panel-strong: #0f223a;
            --text: #13263f;
            --text-soft: #51657f;
            --line: #d6e1ee;
            --brand: #0f6edb;
            --brand-deep: #0a4ea3;
            --brand-soft: #dbeafc;
            --live: #d64141;
            --recent: #0d8f6d;
            --upcoming: #f0982f;
            --shadow: 0 20px 45px rgba(12, 39, 71, 0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: "Manrope", "Segoe UI", "Trebuchet MS", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 800px at -10% -20%, #d5e7ff 0%, transparent 60%),
                radial-gradient(900px 700px at 110% 10%, #d6f3f0 0%, transparent 55%),
                linear-gradient(180deg, var(--bg) 0%, #eef4fa 100%);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(to right, rgba(15, 34, 58, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 34, 58, 0.03) 1px, transparent 1px);
            background-size: 44px 44px;
            z-index: 0;
        }

        .app-shell {
            position: relative;
            z-index: 1;
            max-width: 1240px;
            margin: 0 auto;
            padding: 26px 22px 34px;
        }

        .hero {
            background: linear-gradient(135deg, #0f223a 0%, #163558 60%, #1b3f68 100%);
            border-radius: var(--radius-lg);
            color: #f5fbff;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            overflow: hidden;
            position: relative;
            animation: reveal 650ms ease-out both;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            right: -40px;
            top: -70px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(90, 180, 255, 0.3) 0%, rgba(90, 180, 255, 0.04) 60%, transparent 100%);
        }

        .hero-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }

        .brand-wrap {
            max-width: 720px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-mark .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6ef38d;
            box-shadow: 0 0 0 0 rgba(110, 243, 141, 0.75);
            animation: pulse 1.8s infinite;
        }

        h1 {
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            font-size: clamp(1.7rem, 2.6vw, 2.5rem);
            margin: 14px 0 6px;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            margin: 0;
            color: #cbe0f7;
            font-size: 0.96rem;
            max-width: 760px;
            line-height: 1.5;
        }

        .hero-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            border: 0;
            border-radius: 999px;
            padding: 11px 16px;
            font-weight: 700;
            font-size: 0.86rem;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4da4ff 0%, #2a82df 100%);
            color: #f7fbff;
            box-shadow: 0 10px 20px rgba(34, 119, 210, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(34, 119, 210, 0.45);
        }

        .btn-muted {
            background: rgba(255, 255, 255, 0.14);
            color: #f5fbff;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .btn-muted:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .status-strip {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .stat-chip {
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 14px;
            padding: 12px;
            min-height: 80px;
        }

        .stat-label {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #b7cbe2;
            margin-bottom: 8px;
        }

        .stat-value {
            display: block;
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
        }

        .board {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(190, 210, 230, 0.7);
            border-radius: var(--radius-lg);
            padding: 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 14px 30px rgba(16, 45, 77, 0.1);
            animation: reveal 760ms ease-out both;
            animation-delay: 90ms;
        }

        .board-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0 12px;
            min-height: 48px;
        }

        .search-wrap svg {
            flex: 0 0 auto;
            color: #6e8098;
        }

        .search-wrap input {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            font-size: 0.95rem;
            color: var(--text);
            padding: 12px 10px;
            font-family: inherit;
        }

        .search-wrap input::placeholder {
            color: #8ea0b8;
        }

        .meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            color: var(--text-soft);
            font-size: 0.84rem;
        }

        .meta .pill {
            background: #edf3fa;
            border: 1px solid #d5e1ef;
            border-radius: 999px;
            padding: 7px 10px;
            white-space: nowrap;
        }

        .warning {
            display: none;
            margin: 0 0 12px;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.9rem;
            border: 1px solid #ffd49f;
            color: #8a4c04;
            background: #fff5e8;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tab-btn {
            border: 1px solid #d2dfef;
            background: #f4f8fd;
            color: #44607f;
            border-radius: 999px;
            padding: 8px 13px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 160ms ease;
        }

        .tab-btn:hover {
            border-color: #b8cde7;
            background: #eef4fc;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #1d7de3 0%, #115fb9 100%);
            color: #f8fbff;
            border-color: transparent;
            box-shadow: 0 10px 18px rgba(16, 95, 185, 0.25);
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
            min-height: 220px;
        }

        .match-card {
            background: var(--panel);
            border: 1px solid #d7e3f0;
            border-radius: var(--radius-md);
            padding: 14px;
            box-shadow: 0 8px 18px rgba(20, 50, 82, 0.07);
            position: relative;
            overflow: hidden;
            animation: cardIn 520ms cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
            animation-delay: var(--delay, 0ms);
        }

        .match-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: #b3c7df;
        }

        .match-card.live::before {
            background: linear-gradient(180deg, #fb5f5f 0%, #d64141 100%);
        }

        .match-card.recent::before {
            background: linear-gradient(180deg, #28b889 0%, #0d8f6d 100%);
        }

        .match-card.upcoming::before {
            background: linear-gradient(180deg, #f5bb5a 0%, #f0982f 100%);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .teams {
            margin: 0;
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            font-size: 1.05rem;
            line-height: 1.35;
            letter-spacing: -0.01em;
        }

        .badge {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 6px 9px;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .badge.live {
            color: #7f1212;
            background: #ffe3e3;
            border: 1px solid #ffc5c5;
        }

        .badge.recent {
            color: #07543f;
            background: #daf7ee;
            border: 1px solid #bae8d9;
        }

        .badge.upcoming {
            color: #7b4d11;
            background: #fff0da;
            border: 1px solid #ffd9a9;
        }

        .status {
            margin: 10px 0 8px;
            font-size: 0.88rem;
            color: var(--text-soft);
            font-weight: 600;
            line-height: 1.45;
        }

        .score {
            margin: 0 0 10px;
            background: #edf3fb;
            border: 1px solid #d4e1f2;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 0.88rem;
            color: #1b3a5f;
            font-weight: 700;
            line-height: 1.5;
        }

        .score.empty {
            color: #70839b;
            font-weight: 600;
            font-style: italic;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 7px;
        }

        .meta-line {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.82rem;
            color: #60758f;
            border-top: 1px dashed #dce7f4;
            padding-top: 8px;
        }

        .meta-line strong {
            color: #223d5b;
            font-weight: 700;
            text-align: right;
            max-width: 65%;
        }

        .empty-state {
            display: grid;
            place-items: center;
            text-align: center;
            padding: 30px 20px;
            border: 1px dashed #c6d5e7;
            background: #f7fbff;
            color: #5a6f89;
            border-radius: var(--radius-md);
        }

        .empty-state h3 {
            margin: 0 0 8px;
            font-size: 1.05rem;
            color: #294466;
        }

        .fatal-error {
            display: none;
            margin-top: 12px;
            border: 1px solid #f6b3b3;
            background: #ffe8e8;
            color: #8d1f1f;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.92rem;
        }

        .fatal-error.show {
            display: block;
        }

        @media (max-width: 980px) {
            .status-strip {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .board-top {
                grid-template-columns: 1fr;
            }

            .meta {
                justify-content: flex-start;
            }

            .hero-top {
                flex-direction: column;
            }

            .hero-actions {
                justify-content: flex-start;
            }
        }

        @media (max-width: 640px) {
            .app-shell {
                padding: 16px 12px 26px;
            }

            .hero,
            .board {
                border-radius: 18px;
                padding: 14px;
            }

            .status-strip {
                grid-template-columns: 1fr;
            }

            .matches-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(110, 243, 141, 0.75);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(110, 243, 141, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(110, 243, 141, 0);
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <section class="hero">
            <div class="hero-top">
                <div class="brand-wrap">
                    <div class="brand-mark">
                        <span class="dot"></span>
                        Match Center
                    </div>
                    <h1>CricPulse Scoreboard</h1>
                    <p class="hero-subtitle">
                        Track live games, recent results, and upcoming fixtures on one smooth board.
                        Built for quick scanning with clear status colors and score-first cards.
                    </p>
                </div>
                <div class="hero-actions">
                    <button id="refresh-btn" class="btn btn-primary">Refresh Now</button>
                    <button id="clear-filter-btn" class="btn btn-muted">Clear Search</button>
                </div>
            </div>

            <div class="status-strip">
                <div class="stat-chip">
                    <span class="stat-label">Live Matches</span>
                    <span id="live-count" class="stat-value">0</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-label">Recent Results</span>
                    <span id="recent-count" class="stat-value">0</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-label">Upcoming</span>
                    <span id="upcoming-count" class="stat-value">0</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-label">Total Matches</span>
                    <span id="total-count" class="stat-value">0</span>
                </div>
            </div>
        </section>

        <section class="board">
            <div class="board-top">
                <label class="search-wrap" for="search-input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm10 2-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <input id="search-input" type="text" placeholder="Search team, match name, venue, or status">
                </label>

                <div class="meta">
                    <span id="source-pill" class="pill">Source: -</span>
                    <span id="updated-pill" class="pill">Updated: -</span>
                </div>
            </div>

            <div id="warning" class="warning"></div>

            <div class="tabs" role="tablist" aria-label="Match categories">
                <button class="tab-btn active" data-tab="all" type="button">All</button>
                <button class="tab-btn" data-tab="live" type="button">Live</button>
                <button class="tab-btn" data-tab="recent" type="button">Recent</button>
                <button class="tab-btn" data-tab="upcoming" type="button">Upcoming</button>
            </div>

            <div id="matches-grid" class="matches-grid"></div>
            <div id="fatal-error" class="fatal-error"></div>
        </section>
    </main>

    <script>
        const state = {
            allMatches: [],
            live: [],
            recent: [],
            upcoming: [],
            activeTab: "all",
            search: "",
            lastUpdated: null
        };

        const tabs = Array.from(document.querySelectorAll(".tab-btn"));
        const searchInput = document.getElementById("search-input");
        const refreshButton = document.getElementById("refresh-btn");
        const clearFilterButton = document.getElementById("clear-filter-btn");

        function toSafeText(value, fallback = "N/A") {
            if (value === null || value === undefined || value === "") {
                return fallback;
            }

            return String(value);
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeDate(value) {
            if (!value) {
                return "N/A";
            }

            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) {
                return String(value);
            }

            return parsed.toLocaleString(undefined, {
                weekday: "short",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit"
            });
        }

        function matchTypeTag(match) {
            const stateValue = toSafeText(match.state, "").toLowerCase();
            const status = toSafeText(match.status, "").toLowerCase();

            if (stateValue === "live" || stateValue === "inprogress" || status.includes("live")) {
                return "live";
            }

            if (
                stateValue === "result" ||
                stateValue === "completed" ||
                status.includes("won") ||
                status.includes("match ended") ||
                status.includes("draw") ||
                status.includes("abandoned") ||
                status.includes("no result")
            ) {
                return "recent";
            }

            return "upcoming";
        }

        function buildFallbackBuckets(matches) {
            const live = [];
            const recent = [];
            const upcoming = [];

            matches.forEach((match) => {
                const tag = matchTypeTag(match);
                if (tag === "live") {
                    live.push(match);
                } else if (tag === "recent") {
                    recent.push(match);
                } else {
                    upcoming.push(match);
                }
            });

            return { live, recent, upcoming };
        }

        function normalizePayload(data) {
            const sourceMatches = Array.isArray(data.matches) ? data.matches : [];
            let live = Array.isArray(data.live_matches) ? data.live_matches : [];
            let recent = Array.isArray(data.recent_matches) ? data.recent_matches : [];
            let upcoming = Array.isArray(data.upcoming_matches) ? data.upcoming_matches : [];

            if (live.length === 0 && recent.length === 0 && upcoming.length === 0 && sourceMatches.length > 0) {
                const fallback = buildFallbackBuckets(sourceMatches);
                live = fallback.live;
                recent = fallback.recent;
                upcoming = fallback.upcoming;
            }

            const allMatches = [...live, ...recent, ...upcoming];
            return {
                allMatches,
                live,
                recent,
                upcoming,
                servedFromCache: Boolean(data.served_from_cache),
                warning: data.warning || "",
                cacheAge: data.cache_age_seconds,
                counts: {
                    live: data.live_count ?? live.length,
                    recent: data.recent_count ?? recent.length,
                    upcoming: data.upcoming_count ?? upcoming.length,
                    total: data.total_matches ?? allMatches.length
                }
            };
        }

        function updateTopCounts(counts) {
            document.getElementById("live-count").textContent = counts.live;
            document.getElementById("recent-count").textContent = counts.recent;
            document.getElementById("upcoming-count").textContent = counts.upcoming;
            document.getElementById("total-count").textContent = counts.total;
        }

        function updateMeta(servedFromCache, cacheAge) {
            const sourceText = servedFromCache ? "Source: cached feed" : "Source: live feed";
            document.getElementById("source-pill").textContent = sourceText;

            const now = new Date();
            state.lastUpdated = now;
            let updatedText = "Updated: " + now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" });

            if (servedFromCache && cacheAge !== undefined) {
                updatedText += " | cache age " + cacheAge + "s";
            }

            document.getElementById("updated-pill").textContent = updatedText;
        }

        function updateWarning(message) {
            const warningEl = document.getElementById("warning");
            if (!message) {
                warningEl.style.display = "none";
                warningEl.textContent = "";
                return;
            }

            warningEl.style.display = "block";
            warningEl.textContent = message;
        }

        function setFatalError(message) {
            const el = document.getElementById("fatal-error");
            if (!message) {
                el.classList.remove("show");
                el.textContent = "";
                return;
            }

            el.classList.add("show");
            el.textContent = message;
        }

        function getActiveCollection() {
            if (state.activeTab === "live") {
                return state.live;
            }
            if (state.activeTab === "recent") {
                return state.recent;
            }
            if (state.activeTab === "upcoming") {
                return state.upcoming;
            }
            return state.allMatches;
        }

        function applySearch(collection) {
            const query = state.search.trim().toLowerCase();
            if (!query) {
                return collection;
            }

            return collection.filter((match) => {
                const haystack = [
                    toSafeText(match.name, ""),
                    toSafeText(match.status, ""),
                    toSafeText(match.venue, ""),
                    Array.isArray(match.teams) ? match.teams.join(" ") : "",
                    toSafeText(match.match_type, "")
                ].join(" ").toLowerCase();

                return haystack.includes(query);
            });
        }

        function emptyTitleForTab() {
            if (state.activeTab === "live") {
                return "No live matches right now";
            }
            if (state.activeTab === "recent") {
                return "No recent results to show";
            }
            if (state.activeTab === "upcoming") {
                return "No upcoming fixtures available";
            }
            return "No matches available";
        }

        function emptyMessageForContext() {
            if (state.search.trim()) {
                return "Try a different team name, venue, or clear the search filter.";
            }
            return "Pull latest data using Refresh Now, or wait for the next automatic sync.";
        }

        function renderEmptyState() {
            const grid = document.getElementById("matches-grid");
            grid.innerHTML = `
                <div class="empty-state">
                    <div>
                        <h3>${emptyTitleForTab()}</h3>
                        <p>${emptyMessageForContext()}</p>
                    </div>
                </div>
            `;
        }

        function createCard(match, index) {
            const tag = matchTypeTag(match);
            const badgeText = tag === "live" ? "Live" : tag === "recent" ? "Result" : "Upcoming";
            const teams = Array.isArray(match.teams) && match.teams.length > 0
                ? match.teams.join(" vs ")
                : toSafeText(match.name, "Match details pending");
            const scoreText = toSafeText(match.score, "Score will appear when available");
            const scoreClass = match.score ? "score" : "score empty";
            const safeTeams = escapeHtml(teams);
            const safeBadge = escapeHtml(badgeText);
            const safeStatus = escapeHtml(toSafeText(match.status, "Status unavailable"));
            const safeScore = escapeHtml(scoreText);
            const safeName = escapeHtml(toSafeText(match.name));
            const safeFormat = escapeHtml(toSafeText(match.match_type));
            const safeVenue = escapeHtml(toSafeText(match.venue));
            const safeDate = escapeHtml(normalizeDate(match.date));

            return `
                <article class="match-card ${tag}" style="--delay:${index * 55}ms">
                    <div class="card-top">
                        <h3 class="teams">${safeTeams}</h3>
                        <span class="badge ${tag}">${safeBadge}</span>
                    </div>
                    <p class="status">${safeStatus}</p>
                    <p class="${scoreClass}">${safeScore}</p>
                    <div class="meta-grid">
                        <div class="meta-line"><span>Match</span><strong>${safeName}</strong></div>
                        <div class="meta-line"><span>Format</span><strong>${safeFormat}</strong></div>
                        <div class="meta-line"><span>Venue</span><strong>${safeVenue}</strong></div>
                        <div class="meta-line"><span>Date</span><strong>${safeDate}</strong></div>
                    </div>
                </article>
            `;
        }

        function renderMatches() {
            const collection = getActiveCollection();
            const filtered = applySearch(collection);
            const grid = document.getElementById("matches-grid");

            if (!filtered.length) {
                renderEmptyState();
                return;
            }

            grid.innerHTML = filtered.map((match, index) => createCard(match, index)).join("");
        }

        function setActiveTab(tabName) {
            state.activeTab = tabName;
            tabs.forEach((tab) => {
                tab.classList.toggle("active", tab.dataset.tab === tabName);
            });
            renderMatches();
        }

        async function loadMatches(forceRefresh = false) {
            setFatalError("");

            try {
                const endpoint = forceRefresh ? "/matches?refresh=1" : "/matches";
                const response = await fetch(endpoint);
                const data = await response.json();

                if (!response.ok || data.error) {
                    const detail = data.details ? " - " + data.details : "";
                    throw new Error((data.error || "Failed to fetch match feed") + detail);
                }

                const payload = normalizePayload(data);
                state.allMatches = payload.allMatches;
                state.live = payload.live;
                state.recent = payload.recent;
                state.upcoming = payload.upcoming;

                updateTopCounts(payload.counts);
                updateMeta(payload.servedFromCache, payload.cacheAge);
                updateWarning(payload.warning);
                renderMatches();
            } catch (error) {
                updateWarning("");
                setFatalError(error.message || "Could not load matches.");
                state.allMatches = [];
                state.live = [];
                state.recent = [];
                state.upcoming = [];
                updateTopCounts({ live: 0, recent: 0, upcoming: 0, total: 0 });
                renderMatches();
            }
        }

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => setActiveTab(tab.dataset.tab));
        });

        searchInput.addEventListener("input", (event) => {
            state.search = event.target.value;
            renderMatches();
        });

        refreshButton.addEventListener("click", () => loadMatches(true));

        clearFilterButton.addEventListener("click", () => {
            state.search = "";
            searchInput.value = "";
            renderMatches();
        });

        loadMatches();
        setInterval(() => loadMatches(false), 60000);
    </script>
</body>
</html>

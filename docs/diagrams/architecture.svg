<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Live Cricket Score Monitoring Architecture</title>
  <desc id="desc">Users call Flask API. Flask fetches match data from CricAPI. Prometheus scrapes Flask metrics. Grafana queries Prometheus to render dashboards.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="compose" x1="240" y1="120" x2="1180" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 16px 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; fill: #334155; }
      .section { font: 700 16px 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; fill: #334155; }
      .nodeTitle { font: 700 18px 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; fill: #0F172A; }
      .nodeSub { font: 500 13px 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; fill: #475569; }
      .edgeLabel { font: 600 13px 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; fill: #1E293B; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="520" rx="24" fill="url(#bg)"/>

  <text x="40" y="56" class="title">Live Cricket Score Monitoring Architecture</text>
  <text x="40" y="84" class="subtitle">Flask + Prometheus + Grafana with CricAPI integration</text>

  <rect x="250" y="120" width="920" height="320" rx="24" fill="url(#compose)" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="152" class="section">Docker Compose Network</text>

  <rect x="60" y="210" width="150" height="110" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="94" y="258" class="nodeTitle">Users</text>
  <text x="82" y="282" class="nodeSub">API Clients</text>

  <rect x="450" y="40" width="220" height="110" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <text x="517" y="85" class="nodeTitle">CricAPI</text>
  <text x="500" y="109" class="nodeSub">External Score API</text>

  <rect x="310" y="210" width="220" height="130" rx="16" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <text x="365" y="258" class="nodeTitle">Flask API</text>
  <text x="344" y="282" class="nodeSub">/matches, /live-score</text>
  <text x="375" y="304" class="nodeSub">/metrics (5000)</text>

  <rect x="620" y="210" width="220" height="130" rx="16" fill="#DCFCE7" stroke="#4ADE80" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="258" class="nodeTitle">Prometheus</text>
  <text x="664" y="282" class="nodeSub">Scrape + Alerts</text>
  <text x="690" y="304" class="nodeSub">(9090)</text>

  <rect x="930" y="210" width="220" height="130" rx="16" fill="#FEF9C3" stroke="#FACC15" stroke-width="2" filter="url(#shadow)"/>
  <text x="997" y="258" class="nodeTitle">Grafana</text>
  <text x="986" y="282" class="nodeSub">Dashboards</text>
  <text x="1000" y="304" class="nodeSub">(3000)</text>

  <line x1="210" y1="265" x2="310" y2="265" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="220" y="252" class="edgeLabel">HTTP requests</text>

  <line x1="420" y1="210" x2="540" y2="150" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="398" y="182" class="edgeLabel">fetch live matches</text>

  <line x1="620" y1="300" x2="530" y2="300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="546" y="322" class="edgeLabel">scrapes /metrics</text>

  <line x1="930" y1="265" x2="840" y2="265" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="847" y="252" class="edgeLabel">queries metrics</text>

  <line x1="1040" y1="340" x2="1040" y2="395" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1080" y="376" class="edgeLabel">visualization</text>

  <rect x="930" y="395" width="220" height="70" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="972" y="438" class="nodeSub">Monitoring UI</text>
</svg>
